name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore and build .NET solution
        run: |
          dotnet restore ShelfWise.sln
          dotnet build ShelfWise.sln -c Release --no-restore

      - name: Run .NET tests
        run: dotnet test ShelfWise.sln -c Release --no-build --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        working-directory: src/ShelfWise.Web
        run: |
          npm ci

      - name: Build frontend
        working-directory: src/ShelfWise.Web
        run: npm run build

  apply-migrations:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: shelfwise
          POSTGRES_PASSWORD: shelfwise_pwd
          POSTGRES_DB: shelfwise_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shelfwise -d shelfwise_ci"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Wait for Postgres to be ready
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          echo "Waiting for Postgres on localhost:5432..."
          for i in {1..60}; do
            pg_isready -h localhost -p 5432 -U shelfwise -d shelfwise_ci && break
            echo "Postgres not ready yet, sleeping..."
            sleep 1
          done
          echo "Postgres should be ready."

      - name: Install dotnet-ef tool
        run: |
          dotnet new tool-manifest --force || true
          dotnet tool install dotnet-ef --version 8.*

      - name: Run migrations
        run: |
          dotnet tool run dotnet-ef database update --project src/ShelfWise.Repository --startup-project src/ShelfWise.Api
        env:
          # Use GitHub Actions service host or set DB connection via secrets in production
          ConnectionStrings__DefaultConnection: "Host=127.0.0.1;Database=shelfwise_ci;Username=shelfwise;Password=shelfwise_pwd"
