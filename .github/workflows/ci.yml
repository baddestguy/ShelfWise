name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore and build API
        run: |
          dotnet restore src/ShelfWise.Api
          dotnet build src/ShelfWise.Api -c Release --no-restore

      - name: Run tests
        run: dotnet test tests/ShelfWise.Tests --no-build --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        working-directory: src/ShelfWise.Web
        run: |
          npm ci

      - name: Build frontend
        working-directory: src/ShelfWise.Web
        run: npm run build

  apply-migrations:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Install dotnet-ef tool
        run: |
          dotnet new tool-manifest --force || true
          dotnet tool install dotnet-ef --version 8.*

      - name: Run migrations
        run: |
          dotnet tool run dotnet-ef database update --project src/ShelfWise.Repository --startup-project src/ShelfWise.Api
        env:
          # Use GitHub Actions service host or set DB connection via secrets in production
          ConnectionStrings__DefaultConnection: "Host=127.0.0.1;Database=shelfwise_ci;Username=shelfwise;Password=shelfwise_pwd"
