name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore and build API
        run: |
          dotnet restore src/ShelfWise.Api
          dotnet build src/ShelfWise.Api -c Release --no-restore

      - name: Run tests
        run: dotnet test tests/ShelfWise.Tests --no-build --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        working-directory: src/ShelfWise.Web
        run: |
          npm ci

      - name: Build frontend
        working-directory: src/ShelfWise.Web
        run: npm run build
